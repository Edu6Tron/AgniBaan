<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project AgniBaan — Launch Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fire-1: #ff4500;
      --fire-2: #ff6a00;
      --fire-3: #ffae00;
      --fire-4: #ffe600;
      --dark:   #080a0f;
      --dark-2: #0d1117;
      --dark-3: #111820;
      --steel:  #1c2a3a;
      --glow:   rgba(255, 100, 0, 0.35);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* ── STAR FIELD ── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) infinite ease-in-out;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: var(--o); transform: scale(1.2); }
    }

    /* ── ROCKET EXHAUST GLOW ── */
    .exhaust-glow {
      position: fixed;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,100,0,0.18) 0%, transparent 70%);
      filter: blur(30px);
      animation: pulse-glow 2s ease-in-out infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.15); }
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,100,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,100,0,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── MAIN LAYOUT ── */
    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px;
    }

    /* ── MISSION TAG ── */
    .mission-tag {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.4em;
      color: var(--fire-2);
      text-transform: uppercase;
      border: 1px solid rgba(255,106,0,0.3);
      padding: 6px 20px;
      border-radius: 2px;
      margin-bottom: 18px;
      animation: fadeSlideDown 0.8s ease both;
      background: rgba(255,106,0,0.05);
    }

    /* ── PROJECT NAME ── */
    .project-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.6rem, 7vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 6px;
      animation: fadeSlideDown 0.8s 0.1s ease both;
      background: linear-gradient(135deg, #ffffff 0%, #ffae00 50%, #ff4500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,100,0,0.4));
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 560px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--fire-2), transparent);
      margin: 18px 0;
      animation: fadeIn 1s 0.3s ease both;
    }

    /* ── COUNTDOWN BLOCK ── */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: fadeSlideUp 0.9s 0.2s ease both;
    }

    .countdown-label {
      font-size: 0.72rem;
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .days-number {
      font-family: 'Orbitron', monospace;
      font-size: clamp(5rem, 20vw, 13rem);
      font-weight: 900;
      line-height: 0.9;
      background: linear-gradient(180deg, #ffffff 0%, #ffae00 60%, #ff4500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(255,150,0,0.5));
      position: relative;
    }

    /* flicker effect on number */
    .days-number::after {
      content: attr(data-val);
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #ffffff 0%, #ffae00 60%, #ff4500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: flicker 6s infinite;
      opacity: 0;
    }
    @keyframes flicker {
      0%,94%,96%,98%,100% { opacity: 0; }
      95%,97%              { opacity: 0.6; }
    }

    .days-unit {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 3vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--fire-2);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── TIME BREAKDOWN ── */
    .time-row {
      display: flex;
      gap: clamp(16px, 4vw, 48px);
      margin-top: 20px;
      animation: fadeSlideUp 0.9s 0.35s ease both;
    }

    .time-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time-value {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      font-weight: 700;
      color: #fff;
      line-height: 1;
      min-width: 2.5ch;
      text-align: center;
      border: 1px solid rgba(255,106,0,0.2);
      padding: 10px 16px;
      background: rgba(255,106,0,0.05);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .time-value::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--fire-2), transparent);
      opacity: 0.6;
    }

    .time-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .time-sep {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--fire-2);
      align-self: center;
      margin-bottom: 22px;
      opacity: 0.5;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:0.5} 50%{opacity:0.1} }

    /* ── LAUNCH DATE ── */
    .launch-date {
      margin-top: 22px;
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      animation: fadeIn 1s 0.5s ease both;
    }
    .launch-date span {
      color: rgba(255,174,0,0.7);
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: 100%;
      max-width: 480px;
      margin-top: 24px;
      animation: fadeIn 1s 0.6s ease both;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--fire-1), var(--fire-3));
      border-radius: 2px;
      box-shadow: 0 0 8px var(--fire-2);
      transition: width 1s ease;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-height: 600px) {
      .time-row { margin-top: 10px; }
      .progress-wrap { margin-top: 12px; }
      .launch-date { margin-top: 10px; }
      .divider { margin: 10px 0; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div class="grid-overlay"></div>
<div class="exhaust-glow"></div>

<div class="container">
  <div class="mission-tag">Mission Status — Active</div>
  <div class="project-name">AgniBaan</div>
  <div class="divider"></div>

  <div class="countdown-wrap">
    <div class="countdown-label">Days to Launch</div>
    <div class="days-number" id="days" data-val="44">--</div>
    <div class="days-unit">Days</div>
  </div>

  <div class="time-row">
    <div class="time-unit">
      <div class="time-value" id="hours">--</div>
      <div class="time-label">Hours</div>
    </div>
    <div class="time-sep">:</div>
    <div class="time-unit">
      <div class="time-value" id="minutes">--</div>
      <div class="time-label">Minutes</div>
    </div>
    <div class="time-sep">:</div>
    <div class="time-unit">
      <div class="time-value" id="seconds">--</div>
      <div class="time-label">Seconds</div>
    </div>
  </div>

  <div class="launch-date">Launch Date — <span>March 31, 2026</span></div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Feb 5, 2026</span>
      <span id="pct">0%</span>
      <span>Launch</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="bar" style="width:0%"></div>
    </div>
  </div>
</div>

<script>
  // ── STAR FIELD ──
  const starContainer = document.getElementById('stars');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --o:${(Math.random()*0.7+0.2).toFixed(2)};
      animation-delay:${(Math.random()*5).toFixed(1)}s;
    `;
    starContainer.appendChild(s);
  }

  // ── COUNTDOWN ──
  const LAUNCH   = new Date('2026-03-31T00:00:00');
  const START    = new Date('2026-02-05T00:00:00'); // project start for progress bar

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now  = new Date();
    const diff = LAUNCH - now;

    if (diff <= 0) {
      document.getElementById('days').textContent    = '00';
      document.getElementById('hours').textContent   = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      document.querySelector('.countdown-label').textContent = '🎉 We have launched!';
      document.getElementById('bar').style.width = '100%';
      document.getElementById('pct').textContent = '100%';
      return;
    }

    const totalSec = Math.floor(diff / 1000);
    const days    = Math.floor(totalSec / 86400) + 1; // +1 to include both today and launch day
    const hours   = Math.floor((totalSec % 86400) / 3600);
    const minutes = Math.floor((totalSec % 3600) / 60);
    const seconds = totalSec % 60;

    const daysEl = document.getElementById('days');
    daysEl.textContent = days;
    daysEl.setAttribute('data-val', days);
    document.getElementById('hours').textContent   = pad(hours);
    document.getElementById('minutes').textContent = pad(minutes);
    document.getElementById('seconds').textContent = pad(seconds);

    // progress bar
    const total    = LAUNCH - START;
    const elapsed  = now - START;
    const pct      = Math.min(100, Math.max(0, (elapsed / total * 100)));
    document.getElementById('bar').style.width   = pct.toFixed(1) + '%';
    document.getElementById('pct').textContent   = pct.toFixed(0) + '%';
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
